name: Daily publish

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        hytale-tag: [release, pre-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Get latest commit hash
        run: echo "LATEST_COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Get mod version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          COUNT="$(gh api search/issues -f q="repo:${REPO} is:pr is:merged" --jq '.total_count')"
          echo "MOD_VERSION=1.${COUNT}.0-$(date +'%d%m%y')+$LATEST_COMMIT_HASH" >> "$GITHUB_ENV"
      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - name: Get latest hytale version for ${{ matrix.hytale-tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          HYTALE_VERSION=$(curl -fsSL https://maven.hytale.com/${{ matrix.hytale-tag }}/com/hypixel/hytale/Server/maven-metadata.xml | xmllint --xpath "string(//metadata/versioning/latest)" -)
          echo "Latest version: $HYTALE_VERSION"
          echo "HYTALE_VERSION=$HYTALE_VERSION" >> $GITHUB_ENV
          echo "HYTALE_TAG=${{ matrix.hytale-tag }}" >> $GITHUB_ENV
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          add-job-summary: 'on-failure'
      - name: Build for ${{ matrix.hytale-tag }}
        run: gradle build
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: A Hytale Mod for ${{ matrix.hytale-tag }}
          path: ./build/libs/A-Hytale-Mod.jar
          if-no-files-found: error
      - name: Upload to modtale
        if: ${{ matrix.hytale-tag == 'release' }}
        run: |
          JAR_PATH=build/libs/A-Hytale-Mod.jar
          echo "Publishing Version: $MOD_VERSION"

          curl --fail-with-body -X POST "https://api.modtale.net/api/v1/projects/${{ secrets.PROJECT_ID }}/versions" \
            -H "X-MODTALE-KEY: ${{ secrets.MODTALE_API_KEY }}" \
            -F "file=@$JAR_PATH" \
            -F "versionNumber=$MOD_VERSION" \
            -F "gameVersions=$HYTALE_VERSION" \
            -F "channel=ALPHA" \
            -F "changelog=Automated Build & Release from GitHub"
